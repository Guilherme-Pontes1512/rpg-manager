vaadin:
  launch-browser: true
spring:
  application:
    name: rpg-manager

  profiles:
    active: dev, h2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # com liquibase, evita o Hibernate mexer no schema
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    org.hibernate.SQL: debug
    # org.hibernate.orm.jdbc.bind: trace  # liga se quiser ver valores dos params