databaseChangeLog:
  - changeSet:
      id: 007-password-reset
      author: ducke
      changes:
        - createTable:
            tableName: usuario_recuperacao_senhas
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: usuario_recuperacao_senhas
            baseColumnNames: usuario_id
            referencedTableName: usuarios
            referencedColumnNames: id
            constraintName: fk_usuario_recuperacao_senha_usuario
        - createIndex:
            tableName: usuario_recuperacao_senhas
            indexName: idx_usuario_recuperacao_senha_token
            columns:
              - column:
                  name: token
