databaseChangeLog:
  - changeSet: 
      id: 001-create-campanhas
      author: ducke
      changes:
        - createTable:
            tableName: campanhas
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nome
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: descricao
                  type: text

              - column:
                  name: sistema
                  type: VARCHAR(50)
                  constraints:
                        nullable: false